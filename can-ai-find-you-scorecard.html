document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en-NZ\"><head>\n<meta charset=\"utf-8\">\n<title>Can AI find you? — Human Digital<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<style>\n/* ============================================================\n   Human Digital — AI-Search Readiness Scorecard\n   Brand system: HD Brand Guideline v1.0 (Jan 2025)\n   - Neutrals: HD Black #000, HD Off-White #F7F5F5\n   - One neutral + one accent per screen\n   - Type: HW Nuckle (headlines) / PP Neue Montreal (body)\n   - Graphic: Intersection System (one large shape, cropped)\n   ============================================================ */\n\n@font-face {\n  font-family: 'HW Nuckle';\n  src: url(\"263e24a5-d33e-46c9-9c98-fad0ecff974e\") format('opentype'),\n       url(\"7915114e-cd65-440b-91e1-904f7c8bb8c7\") format('truetype');\n  font-weight: 400; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: 'PP Neue Montreal';\n  src: url(\"b697276b-f771-46cc-9d36-1e42a3c86964\") format('woff2'),\n       url(\"b8b716d6-e005-4015-a84d-9cf9875bd20e\") format('woff');\n  font-weight: 400; font-style: normal; font-display: swap;\n}\n\n:root {\n  --hd-black:  #000000;\n  --hd-off:    #F7F5F5;\n  --hd-red:    #E25F4D;\n  --hd-green:  #4AA481;\n  --hd-blue:   #A3C9FA;\n\n  --font-display: 'HW Nuckle', 'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif;\n  --font-body:    'PP Neue Montreal', 'Helvetica Neue', Helvetica, Arial, sans-serif;\n\n  /* accent is swapped per-screen */\n  --accent: var(--hd-green);\n  --ease: cubic-bezier(0.22, 1, 0.36, 1);\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; height: 100%; }\nbody {\n  font-family: var(--font-body);\n  background: var(--hd-black);\n  color: var(--hd-off);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  overflow: hidden;\n}\nbutton { font-family: inherit; cursor: pointer; }\n::selection { background: var(--accent); color: #000; }\n\n/* ===================== stage ===================== */\n.stage {\n  position: relative;\n  width: 100vw; height: 100vh; height: 100dvh;\n  overflow: hidden;\n}\n.screen {\n  position: absolute; inset: 0;\n  display: flex; flex-direction: column;\n  align-items: center;\n  padding: clamp(28px, 5vw, 72px);\n  overflow-y: auto;\n  opacity: 0;\n  visibility: hidden;\n  transform: translateY(14px);\n  transition: opacity .5s var(--ease), transform .5s var(--ease), visibility 0s linear .5s;\n}\n.screen.is-active {\n  opacity: 1; visibility: visible; transform: none;\n  transition: opacity .55s var(--ease) .05s, transform .55s var(--ease) .05s;\n  z-index: 2;\n}\n.screen--dark  { background: var(--hd-black); color: var(--hd-off); }\n.screen--light { background: var(--hd-off);   color: var(--hd-black); }\n\n.inner {\n  position: relative; z-index: 3;\n  width: 100%;\n  max-width: 720px;\n  margin: auto;\n}\n\n/* ===================== Intersection System shape ===================== */\n.ishape {\n  position: absolute;\n  z-index: 1;\n  pointer-events: none;\n  line-height: 0;\n}\n.ishape svg { width: 100%; height: 100%; display: block; }\n.ishape svg path, .ishape svg polygon { fill: var(--accent); }\n\n/* ===================== brand chrome ===================== */\n.brandbar {\n  position: absolute;\n  top: clamp(22px, 3.4vw, 40px);\n  left: clamp(28px, 5vw, 72px);\n  right: clamp(28px, 5vw, 72px);\n  z-index: 5;\n  display: flex; align-items: center; justify-content: space-between;\n  gap: 16px;\n}\n.brandbar__logo { height: 22px; width: auto; display: block; }\n.logo--white { filter: brightness(0) invert(1); }\n.logo--ink   { filter: brightness(0); }\n.brandbar__tag {\n  font-family: var(--font-body);\n  font-size: 11px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  opacity: 0.55;\n}\n\n/* ===================== typography ===================== */\n.eyebrow {\n  font-family: var(--font-body);\n  font-size: clamp(11px, 1.1vw, 13px);\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  display: inline-flex; align-items: center; gap: 12px;\n  color: var(--accent);\n  margin: 0 0 22px;\n}\n.eyebrow::before { content: ''; width: 30px; height: 2px; background: var(--accent); }\n\n.display {\n  font-family: var(--font-display);\n  font-weight: 400;\n  line-height: 0.92;\n  letter-spacing: -0.01em;\n  margin: 0;\n  text-wrap: balance;\n}\n\n.lede {\n  font-family: var(--font-body);\n  font-size: clamp(16px, 1.5vw, 19px);\n  line-height: 1.55;\n  max-width: 52ch;\n  margin: 26px 0 0;\n  opacity: 0.86;\n}\n\n/* ===================== buttons ===================== */\n.btn {\n  --btn-bg: var(--accent);\n  --btn-fg: #000;\n  font-family: var(--font-body);\n  font-size: 16px;\n  font-weight: 400;\n  letter-spacing: 0.01em;\n  border: none;\n  background: var(--btn-bg);\n  color: var(--btn-fg);\n  padding: 17px 30px;\n  border-radius: 999px;\n  display: inline-flex; align-items: center; gap: 12px;\n  transition: transform .18s var(--ease), filter .18s var(--ease);\n  text-decoration: none;\n}\n.btn:hover { transform: translateY(-2px); filter: brightness(1.06); }\n.btn:active { transform: translateY(0); }\n.btn svg { width: 16px; height: 16px; }\n.btn--ghost-dark {\n  background: transparent; color: var(--hd-off);\n  border: 1.5px solid rgba(247,245,245,0.28);\n}\n.btn--ghost-dark:hover { border-color: var(--hd-off); filter: none; }\n\n/* ===================== intro ===================== */\n#intro .display { font-size: clamp(52px, 9vw, 104px); }\n#intro .cta-row { margin-top: 40px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }\n.intro-note {\n  font-size: 13px; opacity: 0.5; letter-spacing: 0.02em;\n}\n\n/* ===================== question ===================== */\n.q-head {\n  display: flex; align-items: center; justify-content: space-between;\n  gap: 20px;\n  margin-bottom: 30px;\n}\n.q-count {\n  font-family: var(--font-display);\n  font-size: 15px;\n  letter-spacing: 0.08em;\n  color: var(--hd-black);\n  white-space: nowrap;\n}\n.q-count b { color: var(--accent); }\n.q-back {\n  background: none; border: none;\n  font-family: var(--font-body);\n  font-size: 13px; letter-spacing: 0.04em;\n  color: rgba(0,0,0,0.5);\n  display: inline-flex; align-items: center; gap: 7px;\n  padding: 6px 4px;\n  transition: color .18s var(--ease);\n}\n.q-back:hover { color: var(--hd-black); }\n.q-back svg { width: 14px; height: 14px; }\n.q-back[hidden] { visibility: hidden; }\n\n.progress {\n  height: 3px; width: 100%;\n  background: rgba(0,0,0,0.10);\n  border-radius: 999px; overflow: hidden;\n  margin-bottom: 40px;\n}\n.progress__fill {\n  height: 100%; width: 0%;\n  background: var(--accent);\n  border-radius: 999px;\n  transition: width .5s var(--ease);\n}\n\n.q-title {\n  font-family: var(--font-display);\n  font-weight: 400;\n  font-size: clamp(28px, 3.8vw, 44px);\n  line-height: 1.02;\n  letter-spacing: -0.01em;\n  margin: 0;\n  text-wrap: balance;\n}\n.q-sub {\n  font-family: var(--font-body);\n  font-size: clamp(14px, 1.4vw, 16px);\n  line-height: 1.5;\n  opacity: 0.6;\n  margin: 14px 0 0;\n  max-width: 54ch;\n}\n\n.options {\n  list-style: none; margin: 32px 0 0; padding: 0;\n  display: flex; flex-direction: column; gap: 10px;\n}\n.option {\n  width: 100%; text-align: left;\n  background: #fff;\n  border: 1.5px solid rgba(0,0,0,0.12);\n  border-radius: 14px;\n  padding: 18px 20px;\n  font-family: var(--font-body);\n  font-size: clamp(15px, 1.55vw, 18px);\n  line-height: 1.35;\n  color: var(--hd-black);\n  display: flex; align-items: center; gap: 16px;\n  transition: border-color .16s var(--ease), background .16s var(--ease),\n              color .16s var(--ease), transform .12s var(--ease);\n}\n.option:hover { border-color: var(--hd-black); transform: translateX(3px); }\n.option__mark {\n  flex-shrink: 0;\n  width: 22px; height: 22px; border-radius: 999px;\n  border: 1.5px solid rgba(0,0,0,0.25);\n  display: inline-grid; place-items: center;\n  transition: border-color .16 \u002Fp>\n        <p class=\"cta-block__body\">We will look at your brand together, show you what AI says about you right now, and map the fastest way to become one of the answers.<\u002Fp>\n        <a class=\"btn\" id=\"bookBtn\" href=\"https://humandigital.com/nz/consultation?utm_source=scorecard&amp;utm_medium=email&amp;utm_campaign=ai_search_readiness\" target=\"_blank\" rel=\"noopener\">\n          Grab a time with Ben\n          <svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\"><path d=\"M3 8h10M9 4l4 4-4 4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n      <\u002Fdiv>\n\n      <div class=\"res-email\">\n        <p class=\"res-email__q\">Want your result and the fixes emailed to you?<\u002Fp>\n        <p class=\"res-email__sub\">Drop your email and we will send this through, along with a short list of the exact questions we would check for a brand like yours. Optional, and we will not spam you.<\u002Fp>\n        <form class=\"res-email__form\" id=\"emailForm\" novalidate=\"\">\n          <input type=\"email\" id=\"emailInput\" placeholder=\"you@company.com\" autocomplete=\"email\" aria-label=\"Work email\">\n          <button class=\"btn\" type=\"submit\">Email me my result<\u002Fbutton>\n        <\u002Fform>\n        <p class=\"res-email__done\" id=\"emailDone\" hidden=\"\"><\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"res-footer\">\n        <button class=\"res-restart\" id=\"restartBtn\">\n          <svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\"><path d=\"M13.5 8a5.5 5.5 0 1 1-1.6-3.9M13.5 2v3h-3\"><\u002Fpath><\u002Fsvg>\n          Start again\n        <\u002Fbutton>\n        <span class=\"res-sig\">Built by <b>Human Digital<\u002Fb>. Where content meets discovery.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n\n\n<!-- Intersection System shapes (authentic HD brand paths) -->\n<template id=\"shape-a\">\n  <svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1444.9 1265.4\"><path d=\"M1030.79,515.39c0-41.06-4.8-81-13.87-119.28H427.62V83.27h368.77C715.57,30.6,619.06,0,515.39,0,230.75,0,0,230.75,0,515.39s230.75,515.39,515.39,515.39c71.43,0,139.48-14.53,201.33-40.8v275.42h508.64v-573.91h-225.45c19.98-54.95,30.87-114.25,30.87-176.1ZM716.72,989.98v-298.49h283.2c-15.82,43.52-37.34,84.32-63.65,121.46-54.98,77.63-130.9,139.39-219.54,177.03Z\"><\u002Fpath><path d=\"M796.39,83.27c109.09,71.08,189.61,182.37,220.52,312.84h427.99V83.27h-648.51Z\"><\u002Fpath><\u002Fsvg>\n<\u002Ftemplate>\n<template id=\"shape-b\">\n  <svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1961.61 1513.99\"><path d=\"M565.87,290.31c99.24,0,191.73,29,269.42,79.02V0H0v723.16h71.81c32.07-244.28,241.03-432.85,494.06-432.85Z\"><\u002Fpath><polygon points=\"1126.32 0 1126.32 790.85 1469.46 790.85 1469.46 1301.86 1961.61 1301.86 1961.61 0 1126.32 0\"><\u002Fpolygon><path d=\"M67.55,788.65v2.2h996.66v-2.2c0-175.97-91.22-330.66-228.92-419.32v353.83H71.81c-2.81,21.44-4.26,43.28-4.26,65.49Z\"><\u002Fpath><path d=\"M1126.32,790.86h-62.11c-1.19,274.2-223.85,496.12-498.35,496.12s-497.13-221.92-498.32-496.12H0v723.13h1469.46v-212.12h-343.14v-511.01Z\"><\u002Fpath><\u002Fsvg>\n<\u002Ftemplate>\n<template id=\"shape-c\">\n  <svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1087.24 1402.19\"><path d=\"M1087.24,1104.13h-322.05c-23.26,98.17-83.85,181.91-165.94,235.4h-277.49v-235.4h443.43c6.83-28.81,10.44-58.86,10.44-89.76,0-46.54-8.2-91.16-23.23-132.51h-213.1v-224.61c-46.54-19.77-97.74-30.7-151.49-30.7C173.63,626.55,0,800.19,0,1014.37s173.63,387.82,387.82,387.82c78,0,150.63-23.03,211.44-62.66h487.98v-235.4Z\"><\u002Fpath><path d=\"M704.51,790.47c19.8,27.95,35.99,58.65,47.9,91.39h169.64V0h-382.74v657.26c66.7,28.33,123.83,74.8,165.2,133.21Z\"><\u002Fpath><\u002Fsvg>\n<\u002Ftemplate>\n\n<script>\n(function () {\n  'use strict';\n\n  /* ---------- data ---------- */\n  var QUESTIONS = [\n    {\n      title: 'Have you ever actually checked whether AI engines mention your brand?',\n      sub: 'Ask ChatGPT, Perplexity or Google\\u2019s AI a question your buyer would ask, and see if you come up.',\n      why: 'You cannot improve what you have never measured. Most brands have never once looked.',\n      options: [\n        ['Never done it, would not know where to start', 0],\n        ['Tried it once, casually', 1],\n        ['Checked properly for a few key questions', 2],\n        ['We track it regularly and know where we stand', 3]\n      ]\n    },\n    {\n      title: 'When you publish content, is it built around the questions buyers actually ask?',\n      sub: 'Look at your last five blog posts or pages. Are they answering real buyer questions, or covering broad topics?',\n      why: 'AI answers questions. Content built around real, specific questions gets pulled into answers. Generic guides do not.',\n      options: [\n        ['Broad topics, complete-guide-to style', 0],\n        ['Topics we think are relevant, loosely defined', 1],\n        ['Specific questions, but not tied to a specific buyer or region', 2],\n        ['Specific questions a named buyer in a named market actually asks', 3]\n      ]\n    },\n    {\n      title: 'How is your content structured on the page?',\n      sub: 'Picture a typical article on your site.',\n      why: 'AI extracts snippets, not whole pages. Content built in clean, self-contained blocks is easy to lift. Walls of text are invisible.',\n      options: [\n        ['Long paragraphs, few headings, reads like an essay', 0],\n        ['Some headings, mostly prose', 1],\n        ['Clear headings and the odd list', 2],\n        ['Headings, short sections, lists, and at least one table or framework', 3]\n      ]\n    },\n    {\n      title: 'Does your content make clear, quotable claims?',\n      sub: 'The kind of sentence an AI could lift word for word and still have it make sense.',\n      why: 'AI cites clear declarative statements with context. Vague or hedged writing gives it nothing to quote.',\n      options: [\n        ['Not really, it is mostly narrative and opinion', 0],\n        ['Occasionally, by accident', 1],\n        ['Often, we try to be clear and declarative', 2],\n        ['Deliberately, every piece has several standalone, specific statements', 3]\n      ]\n    },\n    {\n      title: 'What is your content mostly made of?',\n      sub: 'Be honest about the last few things you published.',\n      why: 'AI rewards original, credible sources. If your content only echoes the consensus, you are one of a thousand identical voices. Proprietary insight is what gets you named.',\n      options: [\n        ['Restating what everyone in our category already says', 0],\n        ['Best-practice advice, well written but not original', 1],\n        ['Our own point of view on top of the standard advice', 2],\n        ['Proprietary data, case results or insight nobody else has', 3]\n      ]\n    },\n    {\n      title: 'Is it obvious to a machine who you are and what you do?',\n      sub: 'Named brand, defined industries, clear regions, consistent service names across your site.',\n      why: 'AI builds an understanding of entities. If it cannot tell who you are, what you do, and where you operate, it will not confidently recommend you.',\n      options: [\n        ['Our messaging is loose and changes page to page', 0],\n        ['Roughly consistent, but we assume people know the context', 1],\n        ['Mostly clear and consistent', 2],\n        ['Brand, industries, regions and service names are explicit and consistent everywhere', 3]\n      ]\n    },\n    {\n      title: 'When did you last update your site or content with AI search in mind?',\n      sub: '',\n      why: 'AI search moved fast. Content written before it existed was not built to be found this way. Recency and intent both count.',\n      options: [\n        ['Never thought about AI search', 0],\n        ['Aware of it, done nothing yet', 1],\n        ['Made a few changes in the last year', 2],\n        ['Actively building for it right now', 3]\n      ]\n    }\n  ];\n\n  var BANDS = [\n    {\n      min: 0, max: 7,\n      name: 'Invisible',\n      accent: 'var(--hd-red)',\n      tag: 'Band A \\u00B7 Invisible',\n      verdict: 'AI search does not know you exist.',\n      diagnosis: 'Right now, when a buyer asks an AI engine for a recommendation in your category, your name does not come up. Not because you are not good at what you do, but because your content was never built to be read, lifted and cited by a machine. The upside: almost nobody in your category has fixed this yet, so the ground is open.',\n      aisays: 'What AI likely says about you today: nothing. Ask it who to use in your category and it names your competitors instead.',\n      fixes: [\n        'Start measuring. Ask the AI engines the questions your buyers ask and see who they name. You cannot fix what you have not seen.',\n        'Rebuild one page around a single specific question your best buyer actually asks, answered in clean, liftable sections.',\n        'Add one thing only you can say. Your own data, a client result, a real number. Consensus content does not get cited.'\n      ]\n    },\n    {\n      min: 8, max: 14,\n      name: 'Emerging',\n      accent: 'var(--hd-blue)',\n      tag: 'Band B \\u00B7 Emerging',\n      verdict: 'You show up sometimes, but you cannot rely on it.',\n      diagnosis: 'You have some of the pieces. AI can find and quote you occasionally, but it is inconsistent, and you are being outranked by brands that have made themselves easier to cite. A focused push on your weak spots is what moves you from sometimes to reliably.',\n      aisays: 'What AI likely says about you today: it mentions you for some questions and forgets you for others, usually behind a better-optimised rival.',\n      fixes: [\n        'Make it deliberate. Map the specific questions your buyers ask and build a page for each, rather than hoping broad content gets picked up.',\n        'Tighten structure. Short self-contained sections, clear headings, lists and a framework or table, so AI can lift you cleanly.',\n        'Lead with what only you know. Turn campaign data and client results into quotable, specific claims.'\n      ]\n    },\n    {\n      min: 15, max: 21,\n      name: 'Answer-Ready',\n      accent: 'var(--hd-green)',\n      tag: 'Band C \\u00B7 Answer-Ready',\n      verdict: 'You are built to be found and cited.',\n      diagnosis: 'You are doing the hard things most of your competitors are not. AI can read you, quote you and recommend you. The work now is defending that lead, widening it across more buyer questions, and making sure the engines keep choosing you as they change.',\n      aisays: 'What AI likely says about you today: it can describe who you are and recommend you with confidence for the questions you have covered.',\n      fixes: [\n        'Track it properly. Move from spot checks to regular monitoring so you see movement before your competitors do.',\n        'Widen your coverage. Own more of the specific questions across your category, not just your strongest few.',\n        'Protect the moat. Keep publishing proprietary insight faster than your category can copy it.'\n      ]\n    }\n  ];\n\n  /* ---------- per-question fixes (v2 personalised result) ---------- */\n  var FIXES = [\n    { h: 'Look before you build.', t: 'Run the real check. Ask ChatGPT, Perplexity and Google\\u2019s AI the exact questions your buyers ask, and write down whether you appear, who appears instead, and what the engines say about you. You cannot fix a gap you have never seen. This is the first thing we do for every client, and it is usually the moment the penny drops.' },\n    { h: 'Write to questions, not topics.', t: 'Stop publishing broad guides. List the real questions a named buyer in a named market types into an AI engine, then write a clear, direct answer to each one. One page, one question, answered in full. That is the shape AI pulls into results.' },\n    { h: 'Build content a machine can lift.', t: 'Break your pages into clean, self-contained blocks. Clear headings, short sections, lists where they fit, and at least one table or framework per piece. AI extracts snippets, not whole articles. Make the snippets easy to grab and you get quoted. Bury them in an essay and you stay invisible.' },\n    { h: 'Make claims worth quoting.', t: 'Give the engines something they can lift word for word. Every piece should carry several clear, declarative, specific statements that stand on their own and still make sense out of context. Cut the hedging. Vague writing gives AI nothing to cite.' },\n    { h: 'Say something only you can say.', t: 'Consensus content makes you one of a thousand identical voices. Put your own data, your own case results, your own point of view into every piece. Proprietary insight is what gets a brand named by AI rather than blended into the average.' },\n    { h: 'Make it obvious who you are.', t: 'Be explicit and consistent across your whole site about your brand name, the industries you serve, the regions you operate in, and what you call your services. AI builds a picture of you as an entity. If that picture is blurry, it will not confidently recommend you to anyone.' },\n    { h: 'Update with intent, now.', t: 'Most of your content was written before AI search existed, so it was never built to be found this way. Go back through your key pages and rework them deliberately for how the engines read today. Recency and intent both count, and the engines reward the brands actively building for them.' }\n  ];\n  var PRIORITY = [0, 1, 5, 2, 3, 4, 6];\n\n  /* ---------- state ---------- */\n  var answers = new Array(QUESTIONS.length).fill(null);\n  var current = 0;\n\n  /* ---------- els ---------- */\n  var screens = {\n    intro: document.getElementById('intro'),\n    question: document.getElementById('question'),\n    calc: document.getElementById('calc'),\n    result: document.getElementById('result')\n  };\n  var qNow = document.getElementById('qNow');\n  var progressFill = document.getElementById('progressFill');\n  var qTitle = document.getElementById('qTitle');\n  var qSub = document.getElementById('qSub');\n  var optionsEl = document.getElementById('options');\n  var qWhy = document.getElementById('qWhy');\n  var qWhyText = document.getElementById('qWhyText');\n  var backBtn = document.getElementById('backBtn');\n\n  /* ---------- inject brand shapes ---------- */\n  function pad2(n) { return (n < 10 ? '0' : '') + n; }\n  document.querySelectorAll('.ishape').forEach(function (host) {\n    var tpl = document.getElementById('shape-' + host.getAttribute('data-shape'));\n    if (tpl) host.appendChild(tpl.content.cloneNode(true));\n  });\n\n  /* ---------- screen switching ---------- */\n  function show(name) {\n    Object.keys(screens).forEach(function (k) {\n      screens[k].classList.toggle('is-active', k === name);\n    });\n    if (name === 'result') screens.result.scrollTop = 0;\n  }\n\n  /* ---------- render a question ---------- */\n  function renderQuestion(i) {\n    var q = QUESTIONS[i];\n    qNow.textContent = pad2(i + 1);\n    progressFill.style.width = ((i) / QUESTIONS.length * 100) + '%';\n    qTitle.textContent = q.title;\n    qSub.textContent = q.sub || '';\n    qSub.style.display = q.sub ? '' : 'none';\n    qWhyText.textContent = ' ' + q.why;\n    backBtn.hidden = (i === 0);\n\n    optionsEl.innerHTML = '';\n    q.options.forEach(function (opt, idx) {\n      var li = document.createElement('li');\n      var btn = document.createElement('button');\n      btn.className = 'option' + (answers[i] === idx ? ' is-picked' : '');\n      btn.type = 'button';\n      btn.innerHTML =\n        '<span class=\"option__mark\"><svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M3 8.5l3.2 3.2L13 5\"/><\u002Fsvg><\u002Fspan>' +\n        '<span class=\"option__label\"><\u002Fspan>';\n      btn.querySelector('.option__label').textContent = opt[0];\n      btn.addEventListener('click', function () { pick(i, idx, opt[1]); });\n      li.appendChild(btn);\n      optionsEl.appendChild(li);\n    });\n  }\n\n  /* ---------- pick an answer ---------- */\n  var advancing = false;\n  function pick(i, idx, points) {\n    if (advancing) return;\n    answers[i] = idx;\n    var btns = optionsEl.querySelectorAll('.option');\n    btns.forEach(function (b, k) { b.classList.toggle('is-picked', k === idx); });\n    progressFill.style.width = ((i + 1) / QUESTIONS.length * 100) + '%';\n\n    advancing = true;\n    setTimeout(function () {\n      advancing = false;\n      if (i < QUESTIONS.length - 1) {\n        current = i + 1;\n        renderQuestion(current);\n      } else {\n        finish();\n      }\n    }, 380);\n  }\n\n  /* ---------- back ---------- */\n  backBtn.addEventListener('click', function () {\n    if (current > 0) { current -= 1; renderQuestion(current); }\n  });\n\n  /* ---------- keyboard: 1-4 to answer ---------- */\n  document.addEventListener('keydown', function (e) {\n    if (!screens.question.classList.contains('is-active')) return;\n    var n = parseInt(e.key, 10);\n    if (n >= 1 && n <= 4) {\n      var opt = QUESTIONS[current].options[n - 1];\n      if (opt) pick(current, n - 1, opt[1]);\n    }\n  });\n\n  /* ---------- finish + result ---------- */\n  function finish() {\n    show('calc');\n    var total = answers.reduce(function (sum, idx, i) {\n      return sum + (idx == null ? 0 : QUESTIONS[i].options[idx][1]);\n    }, 0);\n    setTimeout(function () { renderResult(total); show('result'); }, 1600);\n  }\n\n  function bandFor(score) {\n    for (var i = 0; i < BANDS.length; i++) {\n      if (score >= BANDS[i].min && score <= BANDS[i].max) return BANDS[i];\n    }\n    return BANDS[BANDS.length - 1];\n  }\n\n  function renderResult(score) {\n    var band = bandFor(score);\n    screens.result.style.setProperty('--accent', band.accent);\n    document.getElementById('resTag').textContent = band.tag;\n    document.getElementById('resBand').textContent = band.name;\n    document.getElementById('resScore').textContent = score;\n    document.getElementById('resVerdict').textContent = band.verdict;\n    document.getElementById('resDiagnosis').textContent = band.diagnosis;\n\n    var lead = 'What AI likely says about you today:';\n    document.getElementById('resAiSays').innerHTML =\n      '<b>' + lead + '<\u002Fb>' + band.aisays.slice(lead.length);\n\n    /* personalised fixes: weakest questions first, never a question scored 3 */\n    var scored = QUESTIONS.map(function (q, i) {\n      return { i: i, s: (answers[i] == null ? 0 : q.options[answers[i]][1]) };\n    });\n    var eligible = scored.filter(function (o) { return o.s < 3; });\n    var target = (band.name === 'Answer-Ready') ? 2 : 3;\n    eligible.sort(function (a, b) {\n      if (a.s !== b.s) return a.s - b.s;\n      return PRIORITY.indexOf(a.i) - PRIORITY.indexOf(b.i);\n    });\n    var chosen = eligible.slice(0, target);\n\n    var introEl = document.getElementById('resFixesIntro');\n    var fixesEl = document.getElementById('resFixes');\n    fixesEl.innerHTML = '';\n    if (chosen.length === 0) {\n      introEl.textContent = 'Nothing obvious to fix. You are in rare company. The value now is defending and widening the lead, which is the conversation to have with Ben.';\n      fixesEl.style.display = 'none';\n    } else {\n      introEl.textContent = 'Here is where you would get the most back, based on your answers. Start at the top.';\n      fixesEl.style.display = '';\n      chosen.forEach(function (o, n) {\n        var fx = FIXES[o.i];\n        var li = document.createElement('li');\n        li.className = 'res-fix';\n        li.innerHTML =\n          '<span class=\"res-fix__n\">' + pad2(n + 1) + '<\u002Fspan>' +\n          '<div class=\"res-fix__body\"><b class=\"res-fix__h\"><\u002Fb><span class=\"res-fix__t\"><\u002Fspan><\u002Fdiv>';\n        li.querySelector('.res-fix__h').textContent = fx.h;\n        li.querySelector('.res-fix__t').textContent = fx.t;\n        fixesEl.appendChild(li);\n      });\n    }\n  }\n\n  /* ---------- controls ---------- */\n  document.getElementById('startBtn').addEventListener('click', function () {\n    current = 0;\n    answers = new Array(QUESTIONS.length).fill(null);\n    renderQuestion(0);\n    show('question');\n  });\n\n  document.getElementById('restartBtn').addEventListener('click', function () {\n    answers = new Array(QUESTIONS.length).fill(null);\n    current = 0;\n    show('intro');\n  });\n\n  /* ---------- optional email capture (ungated) ---------- */\n  var emailForm = document.getElementById('emailForm');\n  if (emailForm) {\n    emailForm.addEventListener('submit', function (e) {\n      e.preventDefault();\n      var input = document.getElementById('emailInput');\n      var done = document.getElementById('emailDone');\n      var val = (input.value || '').trim();\n      done.hidden = false;\n      if (!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(val)) {\n        done.style.color = 'var(--hd-red)';\n        done.textContent = 'That email does not look right. Mind checking it?';\n        return;\n      }\n      done.style.color = 'var(--accent)';\n      done.textContent = 'Done. It is on its way to your inbox.';\n      input.value = '';\n    });\n  }\n\n  /* preload first question so back-nav is instant */\n  renderQuestion(0);\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
