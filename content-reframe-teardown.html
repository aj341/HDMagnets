  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en-NZ\"><head>\n<meta charset=\"utf-8\">\n<title>Content Reframe — The Teardown — Design Bees<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<meta name=\"description\" content=\"A Human Digital teardown tool: tap the weak spots on a real underperforming B2B asset and watch it reframe around the buyer, live.\">\n<style>/* ============================================================\n   Human Digital — shared stage system for the lead-magnet tools.\n   Matches the approved AI-Search Readiness Scorecard build:\n   - Neutrals: HD Black #000, HD Off-White #F7F5F5\n   - One neutral + one accent per screen\n   - Type: HW Nuckle (headlines) / PP Neue Montreal (body)\n   - Graphic: Intersection System (one large shape, cropped)\n   ============================================================ */\n\n@font-face {\n  font-family: 'HW Nuckle';\n  src: url(\"9df31ae8-6a15-4f74-b1a1-c6ad9bfd6d4a\") format('opentype');\n  font-weight: 400; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: 'PP Neue Montreal';\n  src: url(\"85bd11c5-afff-4e77-aaf4-58a4800eb942\") format('woff2');\n  font-weight: 400; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: 'PP Neue Montreal';\n  src: url(\"c778a488-52c9-48c2-bc9d-593b90420679\") format('woff2');\n  font-weight: 500; font-style: normal; font-display: swap;\n}\n\n:root {\n  --hd-black:  #000000;\n  --hd-off:    #F7F5F5;\n  --hd-red:    #E25F4D;\n  --hd-green:  #4AA481;\n  --hd-blue:   #A3C9FA;\n\n  --font-display: 'HW Nuckle', 'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif;\n  --font-body:    'PP Neue Montreal', 'Helvetica Neue', Helvetica, Arial, sans-serif;\n\n  --accent: var(--hd-green);\n  --ease: cubic-bezier(0.22, 1, 0.36, 1);\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; height: 100%; }\nbody {\n  font-family: var(--font-body);\n  background: var(--hd-black);\n  color: var(--hd-off);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  overflow: hidden;\n}\nbutton { font-family: inherit; cursor: pointer; }\na { color: var(--accent); text-decoration: none; }\na:hover { color: var(--hd-off); }\n::selection { background: var(--accent); color: #000; }\n\n/* ===================== stage ===================== */\n.stage { position: relative; width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; }\n.screen {\n  position: absolute; inset: 0;\n  display: flex; flex-direction: column; align-items: center;\n  padding: clamp(28px, 5vw, 72px);\n  overflow-y: auto;\n  opacity: 0; visibility: hidden; transform: translateY(14px);\n  transition: opacity .5s var(--ease), transform .5s var(--ease), visibility 0s linear .5s;\n}\n.screen.is-active {\n  opacity: 1; visibility: visible; transform: none;\n  transition: opacity .55s var(--ease) .05s, transform .55s var(--ease) .05s;\n  z-index: 2;\n}\n.screen--dark  { background: var(--hd-black); color: var(--hd-off); }\n.screen--light { background: var(--hd-off);   color: var(--hd-black); }\n.inner { position: relative; z-index: 3; width: 100%; max-width: 720px; margin: auto; }\n\n/* ===================== Intersection System shape ===================== */\n.ishape { position: absolute; z-index: 1; pointer-events: none; line-height: 0; }\n.ishape svg { width: 100%; height: 100%; display: block; }\n.ishape svg path, .ishape svg polygon { fill: var(--accent); }\n\n/* ===================== brand chrome ===================== */\n.brandbar {\n  position: absolute;\n  top: clamp(22px, 3.4vw, 40px);\n  left: clamp(28px, 5vw, 72px);\n  right: clamp(28px, 5vw, 72px);\n  z-index: 5;\n  display: flex; align-items: center; justify-content: space-between; gap: 16px;\n}\n.brandbar__logo { height: 22px; width: auto; display: block; }\n.logo--white { filter: brightness(0) invert(1); }\n.logo--ink   { filter: brightness(0); }\n.brandbar__tag {\n  font-family: var(--font-body);\n  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.55;\n}\n\n/* ===================== typography ===================== */\n.eyebrow {\n  font-family: var(--font-body);\n  font-size: clamp(11px, 1.1vw, 13px);\n  letter-spacing: 0.2em; text-transform: uppercase;\n  display: inline-flex; align-items: center; gap: 12px;\n  color: var(--accent); margin: 0 0 22px;\n}\n.eyebrow::before { content: ''; width: 30px; height: 2px; background: var(--accent); }\n.display {\n  font-family: var(--font-display); font-weight: 400;\n  line-height: 0.92; letter-spacing: -0.01em; margin: 0; text-wrap: balance;\n}\n.lede {\n  font-family: var(--font-body);\n  font-size: clamp(16px, 1.5vw, 19px); line-height: 1.55;\n  max-width: 54ch; margin: 26px 0 0; opacity: 0.86;\n}\n\n/* ===================== buttons ===================== */\n.btn {\n  --btn-bg: var(--accent); --btn-fg: #000;\n  font-family: var(--font-body); font-size: 16px; font-weight: 400; letter-spacing: 0.01em;\n  border: none; background: var(--btn-bg); color: var(--btn-fg);\n  padding: 17px 30px; border-radius: 999px;\n  display: inline-flex; align-items: center; gap: 12px;\n  transition: transform .18s var(--ease), filter .18s var(--ease); text-decoration: none;\n}\n.btn:hover { transform: translateY(-2px); filter: brightness(1.06); color: #000; }\n.btn:active { transform: translateY(0); }\n.btn svg { width: 16px; height: 16px; }\n.btn[disabled] { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.4); transform: none; }\n.btn--ghost {\n  background: transparent; color: inherit;\n  border: 1.5px solid currentColor;\n}\n.btn--ghost:hover { filter: none; color: inherit; opacity: 0.7; }\n\n/* ===================== intro ===================== */\n.intro .display { font-size: clamp(52px, 9vw, 104px); }\n.cta-row { margin-top: 40px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }\n.intro-note { font-size: 13px; opacity: 0.5; letter-spacing: 0.02em; }\n\n/* ===================== step / question ===================== */\n.q-head { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 30px; }\n.q-count { font-family: var(--font-display); font-size: 15px; letter-spacing: 0.08em; color: var(--hd-black); white-space: nowrap; }\n.q-count b { color: var(--accent); }\n.q-back {\n  background: none; border: none; font-family: var(--font-body);\n  font-size: 13px; letter-spacing: 0.04em; color: rgba(0,0,0,0.5);\n  display: inline-flex; align-items: center; gap: 7px; padding: 6px 4px;\n  transition: color .18s var(--ease);\n}\n.q-back:hover { color: var(--hd-black); }\n.q-back svg { width: 14px; height: 14px; }\n.q-back[hidden] { visibility: hidden; }\n.progress { height: 3px; width: 100%; background: rgba(0,0,0,0.10); border-radius: 999px; overflow: hidden; margin-bottom: 40px; }\n.progress__fill { height: 100%; width: 0%; background: var(--accent); border-radius: 999px; transition: width .5s var(--ease); }\n\n.q-kicker {\n  font-family: var(--font-body); font-size: 12px; letter-spacing: 0.16em;\n  text-transform: uppercase; color: var(--accent); margin: 0 0 14px;\n}\n.q-title {\n  font-family: var(--font-display); font-weight: 400;\n  font-size: clamp(28px, 3.8vw, 44px); line-height: 1.02; letter-spacing: -0.01em; margin: 0; text-wrap: balance;\n}\n.q-sub { font-family: var(--font-body); font-size: clamp(14px, 1.4vw, 16px); line-height: 1.5; opacity: 0.6; margin: 14px 0 0; max-width: 56ch; }\n\n.options { list-style: none; margin: 32px 0 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }\n.option {\n  width: 100%; text-align: left; background: #fff;\n  border: 1.5px solid rgba(0,0,0,0.12); border-radius: 14px;\n  padding: 18px 20px; font-family: var(--font-body);\n  color: var(--hd-black); display: flex; align-items: flex-start; gap: 16px;\n  transition: border-color .16s var(--ease), background .16s var(--ease), color .16s var(--ease), transform .12s var(--ease);\n}\n.option:hover { border-color: var(--hd-black); transform: translateX(3px); }\n.option__mark {\n  flex-shrink: 0; width: 22px; height: 22px; border-radius: 999px; margin-top: 2px;\n  border: 1.5px solid rgba(0,0,0,0.25); display: inline-grid; place-items: center;\n  transition: border-color .16s var(--ease), background .16s var(--ease);\n}\n.option__mark svg { width: 12px; height: 12px; opacity: 0; transition: opacity .16s var(--ease); }\n.option__body { display: flex; flex-direction: column; gap: 5px; }\n.option__label { font-size: clamp(15px, 1.55vw, 18px); line-height: 1.25; }\n.option__desc { font-size: 13.5px; line-height: 1.4; opacity: 0.6; }\n.option.is-picked { background: var(--accent); border-color: var(--accent); color: #000; }\n.option.is-picked .option__desc { opacity: 0.82; }\n.option.is-picked .option__mark { background: #000; border-color: #000; }\n.option.is-picked .option__mark svg { opacity: 1; stroke: var(--accent); }\n\n.tool-nav { display: flex; align-items: center; gap: 16px; margin-top: 34px; }\n.tool-nav .btn svg { transition: transform .18s var(--ease); }\n\n/* ===================== calculating ===================== */\n.calc .display { font-size: clamp(30px, 4.4vw, 52px); }\n.calc-dots { display: inline-flex; gap: 8px; margin-top: 30px; }\n.calc-dots i { width: 9px; height: 9px; border-radius: 999px; background: var(--accent); animation: bob 1s var(--ease) infinite; }\n.calc-dots i:nth-child(2) { animation-delay: .16s; }\n.calc-dots i:nth-child(3) { animation-delay: .32s; }\n@keyframes bob { 0%,100%{ transform: translateY(0); opacity:.35 } 50%{ transform: translateY(-8px); opacity:1 } }\n\n/* ===================== worked example (intro) ===================== */\n.example {\n  margin: 34px 0 0; padding: clamp(22px, 2.6vw, 30px);\n  border-radius: 20px; border: 1px solid rgba(247,245,245,0.16); background: rgba(247,245,245,0.04);\n}\n.example__label { display: block; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 18px; }\n.example__ba { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }\n.example__ba h4 { margin: 0 0 8px; font-family: var(--font-body); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.5; }\n.example__ba p { margin: 0; font-size: 14px; line-height: 1.55; opacity: 0.9; }\n.example__strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 22px; }\n.example__stat { border: 1px solid rgba(247,245,245,0.14); border-radius: 14px; padding: 16px; }\n.example__stat b { display: block; font-family: var(--font-display); font-size: clamp(20px, 2.4vw, 30px); line-height: 1; color: var(--accent); }\n.example__stat span { display: block; margin-top: 8px; font-size: 12.5px; line-height: 1.4; opacity: 0.72; }\n.example__cap { margin: 18px 0 0; font-size: 13px; line-height: 1.5; opacity: 0.6; }\n@media (max-width: 640px) { .example__ba, .example__strip { grid-template-columns: 1fr; } }\n\n/* ===================== result (shared) ===================== */\n.result .inner { max-width: 760px; padding: clamp(78px, 12vh, 104px) 0 64px; }\n.res-eyebrow { color: var(--accent); }\n.res-band { font-family: var(--font-display); font-weight: 400; font-size: clamp(46px, 8vw, 92px); line-height: 0.9; letter-spacing: -0.015em; margin: 0; color: var(--hd-off); }\n.res-intro { font-size: clamp(15px, 1.5vw, 17px); line-height: 1.6; opacity: 0.82; margin: 22px 0 0; max-width: 62ch; }\n\n.brief { margin: 36px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 2px; border-top: 1px solid rgba(247,245,245,0.16); }\n.brief__row { padding: 22px 4px; border-bottom: 1px solid rgba(247,245,245,0.12); }\n.brief__label { font-family: var(--font-body); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin: 0 0 10px; }\n.brief__value { font-family: var(--font-display); font-weight: 400; font-size: clamp(19px, 2.1vw, 26px); line-height: 1.12; margin: 0; color: var(--hd-off); }\n.brief__body { font-size: clamp(14px, 1.4vw, 16px); line-height: 1.6; opacity: 0.82; margin: 12px 0 0; max-width: 64ch; }\n.brief__note { margin: 14px 0 0; padding-left: 14px; border-left: 2px solid var(--accent); font-size: 13.5px; line-height: 1.5; opacity: 0.7; max-width: 60ch; }\n.brief__drops { margin: 12px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 12px; }\n.brief__drops li { font-size: 14px; line-height: 1.55; opacity: 0.82; padding-left: 20px; position: relative; }\n.brief__drops li::before { content: '\\00D7'; position: absolute; left: 0; top: -1px; color: var(--hd-red); font-size: 16px; }\n\n/* diagnostic line (AI-says style) reused by the map */\n.res-callout {\n  margin: 22px 0 0; padding: 16px 20px; border-radius: 14px;\n  background: color-mix(in srgb, var(--accent) 10%, #000);\n  border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);\n  font-size: clamp(14.5px, 1.45vw, 16.5px); line-height: 1.55; color: var(--hd-off); max-width: 64ch;\n}\n.res-callout b { color: var(--accent); font-weight: 400; }\n\n/* proof snippet */\n.res-proof { margin: 36px 0 0; padding: clamp(22px, 2.6vw, 30px); border-radius: 18px; border: 1px solid rgba(247,245,245,0.14); background: rgba(247,245,245,0.04); }\n.res-proof__label { display: block; font-family: var(--font-body); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }\n.res-proof__copy { margin: 0; font-size: clamp(14.5px, 1.45vw, 16px); line-height: 1.6; opacity: 0.9; max-width: 64ch; }\n.res-proof__copy b { color: var(--hd-off); font-weight: 500; }\n\n/* laddered CTA */\n.cta-block { margin: 40px 0 0; padding: clamp(26px, 3vw, 38px); border-radius: 20px; background: color-mix(in srgb, var(--accent) 12%, #000); border: 1px solid color-mix(in srgb, var(--accent) 34%, transparent); }\n.cta-block__q { font-family: var(--font-display); font-size: clamp(19px, 2.1vw, 26px); line-height: 1.15; margin: 0; color: var(--hd-off); max-width: 30ch; }\n.cta-block__body { font-size: clamp(14.5px, 1.4vw, 16px); line-height: 1.6; opacity: 0.82; margin: 16px 0 26px; max-width: 56ch; }\n\n/* email capture */\n.res-email { margin: 34px 0 0; padding-top: 30px; border-top: 1px solid rgba(247,245,245,0.14); }\n.res-email__q { font-family: var(--font-display); font-weight: 400; font-size: clamp(18px, 1.9vw, 23px); margin: 0; color: var(--hd-off); }\n.res-email__sub { font-size: 14px; line-height: 1.55; opacity: 0.7; margin: 12px 0 20px; max-width: 60ch; }\n.res-email__form { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }\n.res-email__form input {\n  flex: 1 1 260px; min-width: 220px; font-family: var(--font-body); font-size: 15px;\n  padding: 15px 20px; border-radius: 999px; border: 1.5px solid rgba(247,245,245,0.24);\n  background: rgba(247,245,245,0.04); color: var(--hd-off); transition: border-color .16s var(--ease);\n}\n.res-email__form input::placeholder { color: rgba(247,245,245,0.4); }\n.res-email__form input:focus { outline: none; border-color: var(--accent); }\n.res-email__done { margin: 16px 0 0; color: var(--accent); font-size: 14.5px; }\n\n/* footer + signature */\n.res-footer { margin: 30px 0 0; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; justify-content: space-between; font-size: 12.5px; }\n.res-restart { background: none; border: none; color: var(--hd-off); font-family: var(--font-body); font-size: 12.5px; letter-spacing: 0.04em; display: inline-flex; align-items: center; gap: 8px; opacity: 0.7; padding: 6px 0; transition: opacity .16s var(--ease); }\n.res-restart:hover { opacity: 1; }\n.res-restart svg { width: 13px; height: 13px; }\n.res-sig { opacity: 0.42; letter-spacing: 0.04em; }\n.res-sig b { color: var(--accent); font-weight: 400; opacity: 1; }\n\n/* ===================== small screens ===================== */\n@media (max-width: 560px) {\n  .brandbar__tag { display: none; }\n  .screen { padding-top: clamp(58px, 16vw, 74px); }\n  .intro .display { font-size: clamp(40px, 13vw, 60px); }\n  .brief__row, .priority__item { padding: 20px 2px; }\n  .priority__head { flex-wrap: wrap; }\n  .priority__state { margin-left: 0; width: 100%; }\n  .res-email__form { flex-direction: column; align-items: stretch; }\n  .res-email__form .btn { justify-content: center; }\n  .res-footer { justify-content: flex-start; }\n  .map-row { grid-template-columns: 1fr; align-items: start; gap: 10px; }\n  .map-tag { justify-self: start; }\n}\n\n@media (prefers-reduced-motion: reduce) {\n  .screen, .progress__fill, .option, .btn { transition-duration: .001s; }\n  .calc-dots i { animation: none; opacity: .8; }\n}\n<\u002Fstyle>\n<style>\n  body { --accent: var(--hd-green); }\n\n  /* ---------- intro ---------- */\n  #intro .display { font-size: clamp(38px, 6.6vw, 76px); }\n  #intro .inner { max-width: 820px; }\n  #intro .lede { margin-top: 18px; max-width: 60ch; }\n  .intro-mini {\n    margin-top: clamp(26px, 4vh, 40px);\n    display: flex; flex-wrap: wrap; gap: 10px 26px; align-items: baseline;\n  }\n  .intro-mini span { font-size: 13px; opacity: .55; display: inline-flex; gap: 9px; align-items: baseline; }\n  .intro-mini b { color: var(--accent); font-weight: 400; font-size: 15px; }\n  .cta-row { margin-top: clamp(26px, 4vh, 40px); display: flex; flex-wrap: wrap; gap: 16px 22px; align-items: center; }\n  .intro-note { font-size: 12.5px; opacity: .5; max-width: 34ch; }\n\n  .btn {\n    display: inline-flex; align-items: center; gap: 12px;\n    font-family: var(--font-body); font-size: 15px; font-weight: 500;\n    color: #000; background: var(--accent);\n    border: none; border-radius: 999px; padding: 15px 26px;\n    transition: transform .14s var(--ease), box-shadow .2s var(--ease);\n  }\n  .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 34px color-mix(in srgb, var(--accent) 40%, transparent); }\n  .btn svg { width: 16px; height: 16px; }\n  .btn--ghost { background: transparent; color: var(--hd-off); border: 1.5px solid rgba(247,245,245,.28); }\n  .btn--ghost:hover { border-color: var(--accent); color: var(--hd-off); box-shadow: none; }\n\n  /* ---------- teardown screen ---------- */\n  #teardown .inner { max-width: 1120px; padding-top: clamp(60px, 8vh, 88px); }\n  .td-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 22px; margin-bottom: 20px; flex-wrap: wrap; }\n  .td-head h2 { font-family: var(--font-display); font-weight: 400; font-size: clamp(22px, 2.7vw, 34px); line-height: 1.05; margin: 0; color: var(--hd-off); max-width: 20ch; }\n  .td-head .td-instruct { font-size: 13.5px; opacity: .6; margin: 8px 0 0; max-width: 40ch; }\n\n  /* progress meter */\n  .td-meter { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }\n  .td-meter__dots { display: flex; gap: 7px; }\n  .td-meter__dot { width: 10px; height: 10px; border-radius: 999px; background: rgba(247,245,245,.16); border: 1.5px solid transparent; transition: background .3s var(--ease), transform .3s var(--ease); }\n  .td-meter__dot.is-open { background: var(--hd-red); }\n  .td-meter__dot.is-fixed { background: var(--accent); transform: scale(1.05); }\n  .td-meter__label { font-size: 12.5px; letter-spacing: .04em; opacity: .7; white-space: nowrap; }\n  .td-meter__label b { color: var(--accent); font-weight: 500; }\n\n  /* the asset document */\n  .doc {\n    position: relative;\n    background: var(--hd-off); color: #14140f;\n    border-radius: 16px;\n    padding: clamp(26px, 4vw, 52px) clamp(24px, 4vw, 56px);\n    box-shadow: 0 40px 90px rgba(0,0,0,.5);\n    max-width: 820px; margin: 0 auto;\n  }\n  .doc__kicker { font-family: var(--font-body); font-size: 12px; letter-spacing: .22em; text-transform: uppercase; color: #8a8577; margin: 0 0 clamp(16px,2.4vw,24px); }\n  .doc__brand { position: absolute; top: clamp(22px,3vw,34px); right: clamp(24px,4vw,46px); font-size: 12px; letter-spacing: .16em; text-transform: uppercase; color: #b4afa0; }\n\n  /* a weak spot */\n  .spot { position: relative; }\n  .spot__tap {\n    display: block; width: 100%; text-align: left; background: none; border: none; padding: 0;\n    color: inherit; font: inherit; position: relative; cursor: pointer;\n    border-radius: 8px; transition: background .18s var(--ease);\n  }\n  .spot__tap:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; }\n\n  .spot--headline .spot__copy { font-family: var(--font-display); font-weight: 400; font-size: clamp(26px, 3.6vw, 44px); line-height: 1.04; letter-spacing: -.01em; }\n  .spot--lede .spot__copy { font-size: clamp(15px, 1.7vw, 19px); line-height: 1.55; color: #3a3730; }\n  .spot--audience { display: inline-block; }\n  .spot--audience .spot__copy { font-size: 13px; letter-spacing: .04em; color: #6f6a5c; }\n  .spot--proof .spot__copy { font-size: clamp(15px, 1.7vw, 18px); line-height: 1.5; color: #3a3730; }\n  .doc__cta { display: inline-flex; }\n  .spot--cta .spot__tap { display: inline-flex; }\n  .spot--cta .spot__copy {\n    display: inline-flex; align-items: center; gap: 10px;\n    background: #d9d5c8; color: #4a4638; border-radius: 999px;\n    padding: 13px 22px; font-size: 14px; font-weight: 500;\n    transition: background .3s var(--ease), color .3s var(--ease);\n  }\n\n  /* before/after copy swap */\n  .spot__copy { position: relative; }\n  .spot__after { display: none; }\n  .spot.is-fixed .spot__before { display: none; }\n  .spot.is-fixed .spot__after { display: inline; }\n  .spot--headline.is-fixed .spot__after,\n  .spot--lede.is-fixed .spot__after,\n  .spot--proof.is-fixed .spot__after { display: block; }\n  .spot.is-fixed .spot__copy { color: #14140f; animation: fixPop .5s var(--ease); }\n  .spot--cta.is-fixed .spot__copy { background: var(--accent); color: #000; }\n  @keyframes fixPop { 0% { opacity: .3; transform: translateY(6px); } 100% { opacity: 1; transform: none; } }\n\n  /* the \"tap me\" affordance on unfixed spots */\n  .spot:not(.is-fixed) .spot__copy::after {\n    content: \"\"; position: absolute; left: 0; right: 0; bottom: -3px; height: 2px;\n    background-image: linear-gradient(90deg, var(--hd-red) 60%, transparent 0);\n    background-size: 8px 2px; background-repeat: repeat-x; opacity: .75;\n  }\n  .spot--cta:not(.is-fixed) .spot__copy::after { display: none; }\n  .spot:not(.is-fixed) .spot__tap:hover .spot__copy { background: rgba(226,95,77,.09); }\n\n  .spot__badge {\n    position: absolute; left: -14px; top: 2px; transform: translateX(-100%);\n    width: 24px; height: 24px; border-radius: 999px;\n    background: var(--hd-red); color: #fff;\n    display: inline-grid; place-items: center; font-size: 12px; font-weight: 600;\n    box-shadow: 0 3px 10px rgba(226,95,77,.4);\n    transition: background .3s var(--ease); font-family: var(--font-body);\n  }\n  .spot.is-fixed .spot__badge { background: var(--accent); }\n  .spot.is-fixed .spot__badge .badge-num { display: none; }\n  .spot.is-fixed .spot__badge .badge-check { display: block; }\n  .spot__badge .badge-check { display: none; width: 12px; height: 12px; stroke: #000; }\n  .spot--audience .spot__badge, .spot--cta .spot__badge { position: static; transform: none; margin-right: 10px; box-shadow: none; }\n\n  /* the \"why\" note */\n  .spot__why {\n    display: grid; grid-template-rows: 0fr; opacity: 0;\n    transition: grid-template-rows .42s var(--ease), opacity .42s var(--ease), margin .42s var(--ease);\n    margin: 0;\n  }\n  .spot.is-fixed .spot__why { grid-template-rows: 1fr; opacity: 1; margin: 14px 0 4px; }\n  .spot__why > div { overflow: hidden; }\n  .why-inner {\n    border-left: 2px solid var(--accent);\n    padding: 10px 0 10px 16px; background: rgba(74,164,129,.06); border-radius: 0 8px 8px 0;\n    padding-right: 16px;\n  }\n  .why-inner .why-label { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: #2f7d5f; margin: 0 0 5px; }\n  .why-inner p { margin: 0; font-size: 13.5px; line-height: 1.5; color: #4a4638; }\n\n  .doc__row { margin-top: clamp(20px, 3vw, 30px); }\n  .doc__row--tight { margin-top: clamp(14px, 2vw, 20px); }\n  .doc__rule { border: none; border-top: 1px solid #e2ddce; margin: clamp(20px,3vw,30px) 0; }\n\n  /* finish bar */\n  .td-finish {\n    max-width: 820px; margin: clamp(22px,3vw,30px) auto 0;\n    display: flex; align-items: center; justify-content: space-between; gap: 18px; flex-wrap: wrap;\n    opacity: 0; transform: translateY(10px); pointer-events: none;\n    transition: opacity .5s var(--ease), transform .5s var(--ease);\n  }\n  .td-finish.is-ready { opacity: 1; transform: none; pointer-events: auto; }\n  .td-finish p { margin: 0; font-size: 14px; opacity: .7; }\n  .td-finish b { color: var(--accent); font-weight: 500; }\n\n  /* ---------- payoff screen ---------- */\n  #payoff .inner { max-width: 1080px; padding-top: clamp(58px, 8vh, 84px); }\n  .po-head { margin-bottom: clamp(20px,3vh,30px); }\n  .po-head .eyebrow { color: var(--accent); }\n  .po-head h2 { font-family: var(--font-display); font-weight: 400; font-size: clamp(28px, 4vw, 50px); line-height: 1.03; margin: 8px 0 0; color: var(--hd-off); max-width: 22ch; }\n\n  .po-toggle { display: inline-flex; gap: 4px; padding: 4px; border-radius: 999px; background: rgba(247,245,245,.07); margin-bottom: clamp(20px,3vh,28px); }\n  .po-toggle button {\n    border: none; background: none; color: rgba(247,245,245,.6);\n    font-family: var(--font-body); font-size: 13.5px; padding: 9px 20px; border-radius: 999px; white-space: nowrap;\n    transition: background .2s var(--ease), color .2s var(--ease);\n  }\n  .po-toggle button.is-active { background: var(--accent); color: #000; }\n\n  .po-view { display: none; }\n  .po-view.is-active { display: block; animation: stepIn .45s var(--ease); }\n  @keyframes stepIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }\n\n  /* before/after */\n  .ba-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(16px,2vw,26px); align-items: start; }\n  .ba-col h4 { font-family: var(--font-body); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; margin: 0 0 12px; }\n  .ba-col--before h4 { color: rgba(247,245,245,.45); }\n  .ba-col--after h4 { color: var(--accent); }\n  .ba-card { border-radius: 14px; padding: clamp(20px,2.6vw,30px); }\n  .ba-card--before { background: rgba(247,245,245,.04); border: 1px solid rgba(247,245,245,.1); }\n  .ba-card--before * { color: rgba(247,245,245,.5) !important; }\n  .ba-card--after { background: var(--hd-off); color: #14140f; }\n  .ba-card .k { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; opacity: .6; margin: 0 0 14px; }\n  .ba-card .h { font-family: var(--font-display); font-weight: 400; font-size: clamp(20px,2.4vw,30px); line-height: 1.06; margin: 0 0 12px; }\n  .ba-card .p { font-size: 14px; line-height: 1.5; margin: 0 0 10px; }\n  .ba-card .aud { font-size: 12px; letter-spacing: .04em; opacity: .7; margin: 0 0 14px; }\n  .ba-card .pill { display: inline-flex; align-items: center; gap: 8px; border-radius: 999px; padding: 11px 18px; font-size: 13px; font-weight: 500; }\n  .ba-card--before .pill { background: rgba(247,245,245,.1); }\n  .ba-card--after .pill { background: var(--accent); color: #000 !important; }\n\n  /* brief */\n  .brief-doc { border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); border-radius: 16px; background: color-mix(in srgb, var(--accent) 7%, #000); padding: clamp(22px,3vw,34px); }\n  .brief-doc__lead { font-family: var(--font-display); font-weight: 400; font-size: clamp(20px,2.6vw,32px); line-height: 1.08; margin: 0 0 clamp(18px,2.4vw,26px); color: var(--hd-off); }\n  .brief-doc__lead .accent { color: var(--accent); }\n  .brief-doc__grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(12px,1.6vw,18px); }\n  .brief-item { border: 1px solid rgba(247,245,245,.1); border-radius: 12px; padding: 16px 18px; background: rgba(247,245,245,.02); }\n  .brief-item .bk { font-size: 10.5px; letter-spacing: .16em; text-transform: uppercase; color: var(--accent); margin: 0 0 7px; }\n  .brief-item .bv { font-size: 14.5px; line-height: 1.4; margin: 0; color: var(--hd-off); }\n\n  .po-cta { margin-top: clamp(26px,4vh,40px); display: flex; align-items: center; gap: 18px 24px; flex-wrap: wrap; }\n  .po-cta .po-cta__note { font-size: 13px; opacity: .6; max-width: 40ch; }\n  .po-cta .po-cta__note b { color: var(--accent); font-weight: 400; }\n\n  /* ---------- mobile ---------- */\n  @media (max-width: 720px) {\n    .td-head { align-items: flex-start; }\n    .doc { padding: 24px 20px 24px 30px; }\n    .doc__brand { position: static; display: block; margin-bottom: 4px; }\n    .spot__badge { left: -8px; }\n    .ba-grid { grid-template-columns: 1fr; }\n    .brief-doc__grid { grid-template-columns: 1fr; }\n    .po-toggle { width: 100%; }\n    .po-toggle button { flex: 1; padding: 11px 8px; }\n  }\n  @media (max-width: 560px) {\n    .brandbar__tag { display: none; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"stage\" id=\"stage\">\n\n  <!-- ==================== INTRO ==================== -->\n  <section class=\"screen screen--dark is-active\" id=\"intro\">\n    <div class=\"brandbar\">\n      <img class=\"brandbar__logo logo--white\" src=\"designbees-logo.png\" alt=\"Design Bees\">\n      <span class=\"brandbar__tag\">Content Reframe Â· The Teardown<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ishape\" data-shape=\"b\" style=\"right:-12%; top:0; width:min(38vw,460px); height:min(56vh,560px); opacity:.35;\"><\u002Fdiv>\n    <div class=\"inner\">\n      <span class=\"eyebrow\">A 90-second teardown<\u002Fspan>\n      <h1 class=\"display\">Most assets don't fail.<br>Their angle does.<\u002Fh1>\n      <p class=\"lede\">A whitepaper, guide or deck can be well made and still land flat — because it speaks to the topic, not the buyer. Here's a real one. Tap the five weak spots and watch it reframe.<\u002Fp>\n      <div class=\"intro-mini\">\n        <span><b>5<\u002Fb> weak spots to find<\u002Fspan>\n        <span><b>0<\u002Fb> forms to fill<\u002Fspan>\n        <span><b>1<\u002Fb> sharper asset at the end<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cta-row\">\n        <button class=\"btn\" id=\"startBtn\">\n          Tear down a real asset\n          <svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\"><path d=\"M3 8h10M9 4l4 4-4 4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <span class=\"intro-note\">Same words. Same length. Aimed at a person instead of a trend.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ==================== TEARDOWN ==================== -->\n  <section class=\"screen screen--dark\" id=\"teardown\">\n    <div class=\"brandbar\">\n      <img class=\"brandbar__logo logo--white\" src=\"designbees-logo.png\" alt=\"Design Bees\">\n      <span class=\"brandbar__tag\">Content Reframe Â· The Teardown<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"td-head\">\n        <div>\n          <h2>A real whitepaper we reviewed.<\u002Fh2>\n          <p class=\"td-instruct\">Tap the underlined spots. Each one shows why it falls flat — then rewrites itself.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"td-meter\">\n          <div class=\"td-meter__dots\" id=\"meterDots\"><\u002Fdiv>\n          <span class=\"td-meter__label\"><b id=\"fixedCount\">0<\u002Fb> of 5 reframed<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- the asset -->\n      <article class=\"doc\" id=\"doc\">\n        <span class=\"doc__brand\">Industrial whitepaper<\u002Fspan>\n        <p class=\"doc__kicker\">Whitepaper Â· Maintenance<\u002Fp>\n\n        <div class=\"spot spot--headline\" data-spot=\"1\" data-label=\"Headline\">\n          <button class=\"spot__tap\" type=\"button\">\n            <span class=\"spot__badge\"><span class=\"badge-num\">1<\u002Fspan><svg class=\"badge-check\" viewBox=\"0 0 16 16\" fill=\"none\" stroke-width=\"2.2\"><path d=\"M3 8.5l3.2 3.2L13 5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <span class=\"spot__copy\"><span class=\"spot__before\">The Future of Predictive Maintenance in Industrial Pumping<\u002Fspan><span class=\"spot__after\">Which pump fails next — and the three signals that warn you first<\u002Fspan><\u002Fspan>\n          <\u002Fbutton>\n          <div class=\"spot__why\"><div><div class=\"why-inner\"><p class=\"why-label\">Why it falls flat<\u002Fp><p>It's about \"the future,\" not their problem. A plant manager scanning their inbox has no reason to stop reading.<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"doc__row spot spot--lede\" data-spot=\"2\" data-label=\"Opening line\">\n          <button class=\"spot__tap\" type=\"button\">\n            <span class=\"spot__badge\"><span class=\"badge-num\">2<\u002Fspan><svg class=\"badge-check\" viewBox=\"0 0 16 16\" fill=\"none\" stroke-width=\"2.2\"><path d=\"M3 8.5l3.2 3.2L13 5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <span class=\"spot__copy\"><span class=\"spot__before\">As Industry 4.0 reshapes the sector, forward-thinking operators are embracing data-driven strategies to unlock new efficiencies and drive digital transformation.<\u002Fspan><span class=\"spot__after\">Unplanned pump failure is the 2am call you dread. These are the three signals that predict it — weeks before it happens.<\u002Fspan><\u002Fspan>\n          <\u002Fbutton>\n          <div class=\"spot__why\"><div><div class=\"why-inner\"><p class=\"why-label\">Why it falls flat<\u002Fp><p>\"Industry 4.0\", \"digital transformation\" — this speaks to a conference panel, not a person with a plant to protect.<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"doc__row--tight doc__row spot spot--audience\" data-spot=\"3\" data-label=\"Who it's for\">\n          <button class=\"spot__tap\" type=\"button\">\n            <span class=\"spot__badge\"><span class=\"badge-num\">3<\u002Fspan><svg class=\"badge-check\" viewBox=\"0 0 16 16\" fill=\"none\" stroke-width=\"2.2\"><path d=\"M3 8.5l3.2 3.2L13 5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <span class=\"spot__copy\"><span class=\"spot__before\">Written for forward-thinking operators.<\u002Fspan><span class=\"spot__after\">For plant &amp; maintenance managers running 20+ pumps.<\u002Fspan><\u002Fspan>\n          <\u002Fbutton>\n          <div class=\"spot__why\"><div><div class=\"why-inner\"><p class=\"why-label\">Why it falls flat<\u002Fp><p>\"Forward-thinking operators\" describes no one. Name the actual buyer and they feel like it was written for them.<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <hr class=\"doc__rule\">\n\n        <div class=\"spot spot--proof\" data-spot=\"4\" data-label=\"Proof\">\n          <button class=\"spot__tap\" type=\"button\">\n            <span class=\"spot__badge\"><span class=\"badge-num\">4<\u002Fspan><svg class=\"badge-check\" viewBox=\"0 0 16 16\" fill=\"none\" stroke-width=\"2.2\"><path d=\"M3 8.5l3.2 3.2L13 5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <span class=\"spot__copy\"><span class=\"spot__before\">This report explores emerging trends, technologies and best-practice frameworks for the modern maintenance function.<\u002Fspan><span class=\"spot__after\">Inside: how a Waikato dairy site cut unplanned downtime 38% in a single quarter — using signals they already had.<\u002Fspan><\u002Fspan>\n          <\u002Fbutton>\n          <div class=\"spot__why\"><div><div class=\"why-inner\"><p class=\"why-label\">Why it falls flat<\u002Fp><p>There's nothing here to believe. One concrete result does more work than ten adjectives.<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"doc__row doc__cta spot spot--cta\" data-spot=\"5\" data-label=\"Call to action\">\n          <button class=\"spot__tap\" type=\"button\">\n            <span class=\"spot__copy\"><span class=\"spot__badge\"> a-view=\"ba\">\n        <div class=\"ba-grid\">\n          <div class=\"ba-col ba-col--before\">\n            <h4>Before — topic-led<\u002Fh4>\n            <div class=\"ba-card ba-card--before\">\n              <p class=\"k\">Whitepaper Â· Maintenance<\u002Fp>\n              <p class=\"h\">The Future of Predictive Maintenance in Industrial Pumping<\u002Fp>\n              <p class=\"p\">As Industry 4.0 reshapes the sector, forward-thinking operators are embracing data-driven strategies to unlock new efficiencies and drive digital transformation.<\u002Fp>\n              <p class=\"aud\">Written for forward-thinking operators.<\u002Fp>\n              <p class=\"p\">This report explores emerging trends, technologies and best-practice frameworks.<\u002Fp>\n              <span class=\"pill\">Download the report<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ba-col ba-col--after\">\n            <h4>After — buyer-led<\u002Fh4>\n            <div class=\"ba-card ba-card--after\">\n              <p class=\"k\">Whitepaper Â· Maintenance<\u002Fp>\n              <p class=\"h\">Which pump fails next — and the three signals that warn you first<\u002Fp>\n              <p class=\"p\">Unplanned pump failure is the 2am call you dread. These are the three signals that predict it — weeks before it happens.<\u002Fp>\n              <p class=\"aud\">For plant &amp; maintenance managers running 20+ pumps.<\u002Fp>\n              <p class=\"p\">Inside: how a Waikato dairy site cut unplanned downtime 38% in a single quarter.<\u002Fp>\n              <span class=\"pill\">Get the 2-page 3-signal checklist<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- brief -->\n      <div class=\"po-view\" data-view=\"brief\">\n        <div class=\"brief-doc\">\n          <p class=\"brief-doc__lead\">Reframe the asset around <span class=\"accent\">the buyer's next decision<\u002Fspan>, not the topic.<\u002Fp>\
